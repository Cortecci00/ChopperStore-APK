<div style="margin-top:4em; margin-bottom:4em" class="container">
  <div class="flex-c" style="margin-top:4em; align-items:center">
    <div class="products-title-block" style="display:flex; flex-direction:column">
      <p class="semibold" style="font-size:64px">Tienda</p>
      <p style="color: #828282; font-size: 24px">Encontrá las mejores skins acá</p>
    </div>
    <span style="flex:1"></span>
    <mat-form-field appearance="outline" class="products-filter" style="min-width:220px">
      <mat-label style="color: #828282">Categoría</mat-label>
      <mat-select [value]="selectedCategoryId" (selectionChange)="onCategoryChange($event.value)">
        <mat-option [value]="null">Todas</mat-option>
        <mat-option *ngFor="let cat of categories" [value]="cat.id">{{cat.name}}</mat-option>
      </mat-select>
    </mat-form-field>
  </div>

  <div *ngIf="!isLoading && skins.length === 0" style="margin-top:4em; text-align:center; color:#828282">
    No hay productos para mostrar.
  </div>

  <div style="margin-top:4em" class="rgrid">
    <mat-card *ngFor="let skin of skins" (click)="goToDetail(skin.id)" style="padding: 10px; cursor:pointer;" class="example-card mat-card-color shadow">
      <img mat-card-image [src]="skin.photoUrl ?? 'https://material.angular.io/assets/img/examples/shiba1.jpg'" style="height:180px; object-fit:cover; border-radius:6px" />
      <mat-card-header class="mat-card-header">
        <mat-card-title class="product-card-title">{{skin.name}}</mat-card-title>
      </mat-card-header>
      <mat-card-content class="mat-card-color">
        <p class="product-detail-line" style="color:#828282">{{skin.rarity}} · {{skin.category.name}}</p>
        <p class="product-detail-line semibold" style="font-size:20px; color:#D9697D">${{skin.price}}</p>
      </mat-card-content>
      <div class="product-action">
        <button style="background-color: #D9697D; color: white;" class="btn" mat-flat-button (click)="addToCart(skin, $event)">Agregar al carrito</button>
      </div>
    </mat-card>
  </div>
</div>
