<div class="auth-card shadow">
  <div style="text-align: center; margin-bottom: 20px;">
    <p class="semibold" style="font-family:Calibri; font-size: 32px">Crear nueva contraseña</p>
  </div>

  @if (tokenPresente()) {
    <form [formGroup]="formReset" (ngSubmit)="guardar()" style="margin-top:20px;" class="example-form">
      <p class="semibold">Nueva contraseña</p>
      <mat-form-field appearance="outline" class="example-full-width">
        <mat-label style="color: #828282">Ingresá tu nueva contraseña</mat-label>
        <input style="color: #828282" matInput [type]="hide() ? 'password' : 'text'" [formControl]="password" required />
        <button mat-icon-button type="button" matSuffix (click)="clickEvent($event)" [attr.aria-label]="'Ocultar contraseña'" [attr.aria-pressed]="hide()">
          <mat-icon>{{hide() ? 'visibility_off' : 'visibility'}}</mat-icon>
        </button>
        @if (password.invalid) {
          <mat-error>Debe tener al menos 5 caracteres</mat-error>
        }
      </mat-form-field>
      <button style="margin-top:20px; background-color: #D9697D; color: white;" class="btn" type="submit" mat-flat-button [disabled]="guardando()">
        {{ guardando() ? 'Guardando...' : 'Guardar nueva contraseña' }}
      </button>
    </form>
  } @else {
    <p style="color:#828282; text-align:center;">Este link no es válido. Solicitá uno nuevo desde la pantalla de login.</p>
  }

  <div class="ltxt" style="margin-top: 20px;">
    <a routerLink="/login" style="color:#828282">Volver a iniciar sesión</a>
  </div>
</div>
