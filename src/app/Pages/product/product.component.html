<div *ngIf="isLoading" style="text-align:center; margin-top:4em; color:#828282">Cargando...</div>

<div *ngIf="!isLoading && skin" style="margin-top: 4em;" class="flex-container">
  <div class="flex-item-left">
    <div style="display: flex; flex-direction:column; align-items:center; justify-content:center">
      <img [src]="skin.photoUrl ?? 'https://material.angular.io/assets/img/examples/shiba2.jpg'" class="company shadow">
    </div>
  </div>
  <div class="flex-item-right">
    <div class="container">
      <p class="bold" style="font-size:36px">{{skin.name}}</p>
      <p style="color:#828282; font-size:18px">{{skin.rarity}} · {{skin.category.name}}</p>
      <p style="color:#828282">Float: {{skin.skinFloat}} · Patrón: {{skin.pattern}}</p>
      <p class="semibold" style="font-size:28px; color:#D9697D; margin-top:1em">${{skin.price}}</p>

      <div style="margin-top:1em">
        <button style="background-color: #D9697D; color: white;" class="btn shadow" mat-flat-button (click)="addToCart()">Agregar al carrito</button>
      </div>
    </div>
  </div>
</div>
