<div style="margin-top:4em"class="container">
  <div class="flex-c" style="margin-top:4em">
    <div style="display:flex; flex-direction:column">
      <p class="semibold" style="font-size:64px">Reputación</p>
      <p style="color: #828282; font-size: 24px">¡Encuentra las recomendaciones de nuestros clientes aquí!</p>
    </div>
    <span style="flex:1"></span>
    <div style="display: flex;align-items:center">
      <button style="background-color: #D9697D; color: white;" class="btn" mat-flat-button (click)="openCreateDialog()">Crear</button>
    </div>
  </div>

  <div *ngIf="recommendations.length === 0" style="margin-top:4em; text-align:center; color:#828282">
    Todavía no hay recomendaciones. ¡Sé el primero en dejar una!
  </div>

  <div style="margin-top:4em" class="rgrid">
    <mat-card *ngFor="let rec of recommendations" style="padding: 10px;" class="example-card mat-card-color shadow">
      <mat-card-header class="mat-card-header">
        <div mat-card-avatar class="user-avatar" [style.background-image]="rec.usuario.photoUrl ? 'url(' + rec.usuario.photoUrl + ')' : null">
          <span *ngIf="!rec.usuario.photoUrl">{{rec.usuario.username.charAt(0).toUpperCase()}}</span>
        </div>
        <mat-card-title>{{rec.usuario.username}}</mat-card-title>
      </mat-card-header>
      <mat-card-content class="mat-card-color">
        <p>{{rec.text}}</p>
      </mat-card-content>
      <div *ngIf="canDelete(rec)" style="display:flex; justify-content:flex-end">
        <button mat-icon-button (click)="deleteRecommendation(rec.id)" aria-label="Eliminar">
          <mat-icon>delete</mat-icon>
        </button>
      </div>
    </mat-card>
  </div>

</div>
