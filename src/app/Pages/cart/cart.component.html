<div style="text-align: center; margin-top: 4em;">
  <h1 class="bold" style="font-family:Calibri;">Carrito</h1>
</div>

<div *ngIf="!isLoading && cart && cart.items.length === 0" style="margin-top:4em; text-align:center; color:#828282">
  Tu carrito está vacío. <a routerLink="/products" style="color:#D9697D">Ir a la tienda</a>
</div>

<div *ngIf="cart && cart.items.length > 0">
  <div style="margin-top:4em; border-radius:10px; padding:24px; margin-left:5%; margin-right:5%" class="mat-elevation-z8 shadow">
    <table mat-table [dataSource]="dataSource" style="background-color:white">

      <ng-container matColumnDef="skin">
        <th class="bold" style="color:black" mat-header-cell *matHeaderCellDef>Producto</th>
        <td style="color:black" mat-cell *matCellDef="let item">{{item.skin.name}}</td>
      </ng-container>

      <ng-container matColumnDef="price">
        <th class="bold" style="color:black" mat-header-cell *matHeaderCellDef>Precio</th>
        <td style="color:black" mat-cell *matCellDef="let item">${{item.skin.price}}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th class="bold" style="color:black" mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let item">
          <button mat-icon-button (click)="removeItem(item.id)" aria-label="Eliminar">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
    <mat-divider></mat-divider>
    <mat-paginator [length]="dataSource.data.length" [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons aria-label="Paginador del carrito"></mat-paginator>
  </div>

  <div style="display:flex; justify-content:space-between; align-items:center; margin-left:5%; margin-right:5%; margin-top:1.5em; margin-bottom:4em">
    <p class="semibold" style="font-size:24px">Total: <span style="color:#D9697D">${{total}}</span></p>
    <div style="display:flex; gap:1em">
      <button class="btn shadow" mat-flat-button (click)="clearCart()">Vaciar carrito</button>
      <button style="background-color: #D9697D; color: white;" class="btn shadow" mat-flat-button (click)="checkout()">Finalizar compra</button>
    </div>
  </div>
</div>
